name: Validate JSON

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail
          find . -name '*.json' -type f -print0 | while IFS= read -r -d '' file; do
            python -m json.tool "$file" > /dev/null
          done
